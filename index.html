<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eco-Climate Laboratory</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>

body{
background:#020402;
color:#69ff9a;
font-family:monospace;
margin:0;
padding:20px;
}

/* CRT glow */

body::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
rgba(0,0,0,.15) 0px,
rgba(0,0,0,.15) 1px,
transparent 2px,
transparent 4px
);
}

h1{
font-weight:normal;
text-shadow:0 0 8px #69ff9a;
}

.controls{
margin-bottom:20px;
}

input{
width:220px;
}

button{
background:black;
color:#69ff9a;
border:1px solid #69ff9a;
padding:6px 12px;
cursor:pointer;
}

.plot{
height:380px;
border:1px solid #69ff9a33;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Eco-Climate Laboratory</h1>

<div class="controls">

<div>
Years
<input id="years" type="range" min="100" max="1000" value="500">
</div>

<div>
Peak CO₂ emissions
<input id="peak" type="range" min="10" max="80" value="40">
</div>

<div>
Urban growth
<input id="urban" type="range" min="0" max="0.1" step="0.005" value="0.02">
</div>

<div style="margin-top:10px">
<button onclick="run()">Run</button>
<button onclick="exportJSON()">Export JSON</button>
</div>

</div>

<div id="tempPlot" class="plot"></div>
<div id="co2Plot" class="plot"></div>

<script>

let lastOutput=null

function logistic(t,L,k,t0){
return L/(1+Math.exp(-k*(t-t0)))
}

function simulate(p){

const dt=1
const n=p.years

let t=[]
let T=[]
let C=[]
let urban=[]

let temp=0
let co2=420

for(let i=0;i<n;i++){

t.push(i)

let emissions = i<50
? p.peak*(i/50)
: p.peak*Math.exp(-(i-50)/80)

let urb = logistic(i,0.15,p.urban,120)

let forcing = 3.7*Math.log(co2/280)/Math.log(2)
+ 2*urb

temp += (forcing - 1.1*temp)/8

co2 += (0.45*emissions - 0.02*(co2-280))

T.push(temp)
C.push(co2)
urban.push(urb)

}

return {t,T,C,urban}

}

function run(){

const params={
years:+document.getElementById("years").value,
peak:+document.getElementById("peak").value,
urban:+document.getElementById("urban").value
}

const out=simulate(params)

lastOutput=out

Plotly.newPlot("tempPlot",[{
x:out.t,
y:out.T,
mode:"lines",
name:"temperature"
}],{
paper_bgcolor:"#020402",
plot_bgcolor:"#020402",
font:{color:"#69ff9a"},
title:"Temperature"
})

Plotly.newPlot("co2Plot",[{
x:out.t,
y:out.C,
mode:"lines",
name:"CO2"
}],{
paper_bgcolor:"#020402",
plot_bgcolor:"#020402",
font:{color:"#69ff9a"},
title:"Atmospheric CO₂"
})

}

function exportJSON(){

if(!lastOutput)return

const blob=new Blob(
[JSON.stringify(lastOutput,null,2)],
{type:"application/json"}
)

const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="eco_climate_run.json"
a.click()

}

run()

</script>

</body>
</html>
